<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>World News | OdinWire</title>
    <meta name="description" content="Latest World News updates from BBC, Reuters, and Al Jazeera — auto-refreshed via RSS feeds.">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <header class="site-header">
        <h1 id="page-title">World News</h1>
    </header>

    <nav class="nav-bar">
        <a href="/index.html" class="brand">OdinWire</a>
        <a href="/news/world.html" class="active">World</a>
        <a href="/news/uk.html">UK</a>
        <a href="/news/tech.html">Tech</a>
        <a href="/news/sports.html">Sports</a>
        <a href="/news/entertainment.html">Entertainment</a>

        <button id="compact-toggle" class="compact-toggle">Compact</button>
        <button id="theme-toggle" class="theme-toggle">🌙</button>
    </nav>

    <main class="content enhanced">

        <div class="layout-desktop">

            <div class="main-feed">

                <div class="feed-selector">
                    <div class="feed-selector-header">
                        <h3>Select News Sources</h3>
                        <div class="feed-selector-actions">
                            <button id="select-all-feeds" type="button">All</button>
                            <button id="clear-all-feeds" type="button">None</button>
                        </div>
                    </div>

                    <label class="feed-option feed-bbc">
                        <input type="checkbox" class="feed-check" value="bbc" checked>
                        <span class="feed-label-text">BBC World</span>
                    </label>

                    <label class="feed-option feed-reuters">
                        <input type="checkbox" class="feed-check" value="reuters" checked>
                        <span class="feed-label-text">Reuters World</span>
                    </label>

                    <label class="feed-option feed-aljazeera">
                        <input type="checkbox" class="feed-check" value="aljazeera" checked>
                        <span class="feed-label-text">Al Jazeera Global</span>
                    </label>
                </div>

                <div class="feed-meta">
                    <span id="main-last-updated">Last updated: —</span>
                    <span id="main-loading" class="loading-indicator">Loading…</span>
                </div>

                <div id="trending-keywords" class="trending-keywords">
                    <span class="trending-label">Trending:</span>
                    <span id="trending-list"></span>
                </div>

                <div id="rss-container" class="rss-container"></div>
            </div>

            <aside class="top-stories-rail">
                <h3>Top Stories</h3>
                <div id="top-stories"></div>

                <div class="live-refresh">
                    Updated <span id="refresh-time">just now</span><br>
                    Next refresh in <span id="next-refresh">60</span>s
                </div>
            </aside>

        </div>

    </main>

    <footer class="site-footer">
        <p>© 2026 OdinWire</p>
    </footer>

    <script src="/js/rss-loader.js?v=13"></script>

    <script>
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            document.documentElement.setAttribute("data-theme", savedTheme);
        }

        const themeToggle = document.getElementById("theme-toggle");
        themeToggle.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme");
            const next = current === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);
            themeToggle.textContent = next === "dark" ? "☀️" : "🌙";
        });

        const compactToggle = document.getElementById("compact-toggle");
        const savedCompact = localStorage.getItem("compact-mode");
        if (savedCompact === "on") {
            document.body.classList.add("compact");
        }
        compactToggle.addEventListener("click", () => {
            document.body.classList.toggle("compact");
            const isOn = document.body.classList.contains("compact");
            localStorage.setItem("compact-mode", isOn ? "on" : "off");
        });
    </script>

</body>
</html>
