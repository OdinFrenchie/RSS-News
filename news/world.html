<!DOCTYPE html>
<html lang="en" data-theme="light" data-theme-accent="default">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World News</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="site-header">
    <h1>World News</h1>
</header>

<nav class="nav-bar">
    <a href="index.html">Home</a>
    <a href="world.html" class="active">World</a>
    <a href="tech.html">Tech</a>
    <a href="business.html">Business</a>
    <div class="nav-spacer"></div>
    <input type="text" id="searchInput" class="search-input" placeholder="Search…">
    <button class="theme-toggle" id="themeToggle">Theme</button>
    <button class="compact-toggle" id="compactToggle">Compact</button>
    <button class="settings-toggle" id="settingsToggle">⚙</button>
</nav>

<div class="content">

    <!-- 4‑COLUMN DESKTOP LAYOUT -->
    <div class="layout-desktop">

        <!-- LEFT RAIL (20%) -->
        <aside class="left-rail">

            <!-- WEATHER -->
            <section class="lr-card" id="weatherWidget">
                <h3>Weather</h3>
                <div id="weatherContent">Loading…</div>
            </section>

            <!-- QUICK LINKS -->
            <section class="lr-card">
                <h3>Quick Links</h3>
                <div id="quickLinksList"></div>
                <input id="quickLinkInput" placeholder="Add link…" />
                <button id="addQuickLinkBtn">Add</button>
            </section>

            <!-- TIMEZONES -->
            <section class="lr-card">
                <h3>Global Timezones</h3>
                <div id="tzLondon"></div>
                <div id="tzNewYork"></div>
                <div id="tzTokyo"></div>
            </section>

        </aside>

        <!-- MAIN FEED (40%) -->
        <main class="main-feed">
            <div class="feed-meta">
                <span id="lastUpdated">Last updated: --:--:--</span>
                <span class="loading-indicator" id="loadingIndicator">Loading…</span>
            </div>

            <div class="source-filters" id="sourceFilters"></div>
            <div class="trending-keywords" id="trendingKeywords"></div>

            <div class="rss-container" id="rssContainer"></div>
            <div id="scroll-loading">Loading more…</div>
        </main>

        <!-- EXISTING RIGHT SIDEBAR (20%) -->
        <aside class="top-stories-rail">
            <h3>Top Stories</h3>
            <div id="topStories"></div>

            <h3>Saved Articles</h3>
            <div id="saved-articles"></div>

            <h3>Most Read Today</h3>
            <div id="mostRead"></div>

            <h3>Top Sources</h3>
            <div id="topSources"></div>
        </aside>

        <!-- NEW RIGHT RAIL (20%) — EMPTY UNTIL v0.9.5 -->
        <aside class="right-rail">
            <div class="rr-placeholder">Right rail features coming in v0.9.5…</div>
        </aside>

    </div>
</div>

<!-- Sticky Bottom Ad -->
<div class="bottom-ad-banner">
    <div class="bottom-ad-inner">
        <div class="ad-label">Advertisement</div>
        <div class="ad-card">Your ad here</div>
    </div>
</div>

<script src="rss-loader.js"></script>
</body>
</html>
