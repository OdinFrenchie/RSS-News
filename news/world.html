<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>World News | OdinWire</title>
    <meta name="description" content="Latest World News updates from BBC, Reuters, and Al Jazeera — auto-refreshed via RSS feeds.">

    <link rel="stylesheet" href="/css/style.css">
</head>

<body>

    <header class="site-header">
        <h1 id="page-title">World News</h1>
    </header>

    <nav class="nav-bar">
        <a href="/index.html" class="brand">OdinWire</a>
        <a href="/news/world.html" class="active">World</a>
        <a href="/news/uk.html">UK</a>
        <a href="/news/tech.html">Tech</a>
        <a href="/news/sports.html">Sports</a>
        <a href="/news/entertainment.html">Entertainment</a>

        <button id="theme-toggle" class="theme-toggle">🌙</button>
    </nav>

    <main class="content enhanced">

        <div class="layout-desktop">

            <div class="main-feed">
                <div id="rss-container" class="rss-container"></div>
            </div>

            <aside class="top-stories-rail">
                <h3>Top Stories</h3>
                <div id="top-stories"></div>

                <div class="live-refresh">
                    Updated <span id="refresh-time">just now</span>
                </div>
            </aside>

        </div>

    </main>

    <div class="ad-container">
        <div class="ad-slot" id="ad-slot-bottom">Loading ads...</div>
    </div>

    <footer class="site-footer">
        <p>© 2026 OdinWire</p>
    </footer>

    <script src="/js/rss-loader.js?v=11"></script>

    <script>
        loadRSS([
            "https://feeds.bbci.co.uk/news/world/rss.xml",
            "https://feeds.reuters.com/reuters/worldNews",
            "https://www.aljazeera.com/xml/rss/all.xml"
        ]);
    </script>

    <script>
        const savedTheme = localStorage.getItem("theme");
        if (savedTheme) {
            document.documentElement.setAttribute("data-theme", savedTheme);
        }

        const toggle = document.getElementById("theme-toggle");
        toggle.addEventListener("click", () => {
            const current = document.documentElement.getAttribute("data-theme");
            const next = current === "dark" ? "light" : "dark";
            document.documentElement.setAttribute("data-theme", next);
            localStorage.setItem("theme", next);
            toggle.textContent = next === "dark" ? "☀️" : "🌙";
        });
    </script>

</body>
</html>
